name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # The pinned Pi compatibility fixture requires Node >=22.19.0.
          node-version: "22.19.0"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: xvfb-run -a npm run test:render
      # Includes the repository-pinned Pi 0.80.10 SDK-host suites. They use only
      # an isolated loopback provider and require no developer Pi or API key.
      - run: xvfb-run -a npm run test:e2e