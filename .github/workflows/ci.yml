name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # TODO: add xvfb-run -a npm run test:e2e when e2e reliably passes headless.
      #   The self-contained kitty e2e (tests/e2e/unified-panel.spec.mts, fake
      #   host, no real pi) would run here once e2e is enabled — it proves the
      #   renderer half of the keyboard protocol (xterm 6.1 emits CSI-u).

  # Opt-in real-pi lane (NOT in CI yet). Uncomment + provide secrets when a
  # macOS runner with pi + provider auth is available. Until then this is a
  # MANDATORY pre-release manual gate — see RELEASING.md.
