appId: dev.pivis.app
productName: Pi-Vis
directories:
  buildResources: resources
  output: release/${version}
files:
  - out/**/*
  - LICENSE
  - THIRD_PARTY_NOTICES.md
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig,tsconfig.*}.json"
  - "!vite.*.{js,ts}"
  - "!{karma,rollup,webpack}.config.{js,ts}"
  - "!{.mocharc,.prettierrc}.{js,cjs,yml,yaml}"
asarUnpack:
  - resources/**
  # ALL of node_modules must be real files, not asar entries: the pinned pi
  # runtime (SDK host fork under system Node, pty spawning dist/cli.js) reads
  # its dependency tree with plain-node fs, and electron-builder re-hoists
  # pi's shrinkwrapped nested deps to top-level node_modules at package time —
  # so unpacking only @earendil-works/** leaves a broken module graph inside
  # the asar. Renderer deps are vite-bundled into out/, so the packaged
  # node_modules exists only for subprocess/native consumption anyway.
  - node_modules/**
  - out/resources/pi-session-host/**
  - out/main/session-search-worker.js
  - out/main/chunks/**
mac:
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Not required
    NSCameraUsageDescription: Not required
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  executableName: pi-vis
  target:
    - target: nsis
linux:
  target:
    - target: AppImage
    - target: snap
  category: Development
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
